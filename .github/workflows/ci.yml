name: AGD Magick Mind CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Format and/or Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install the latest version of Ruff or check from pyproject.toml
        uses: astral-sh/ruff-action@v3
      - run: ruff check --fix
      - run: ruff format

