[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "super_brain"
version = "0.0.1"
authors = [
    { name = "GMI", email = "minoak@globalmagicko.com" },
]
description = "A package for the Super Brain project by General Magicko Industries"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/General-Magick-Industries/AGD_Super_Brain"

[tool.hatch.build.targets.wheel]
packages = ["libs"]

[tool.hatch.build.targets.wheel.force-include]
"libs" = "super_brain" 