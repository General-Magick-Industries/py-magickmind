[project]
name = "magick_mind"
version = "0.0.1"
authors = [
    { name = "Adrian", email = "minoak@globalmagicko.com" },
    { name = "Turtle", email = "turtle@globalmagicko.com" },
    { name = "Min Thu Wai", email = "minthu@globalmagicko.com" },
]
description = "SDK version to use Magick Mind AI service developed by Magick Mind Team."
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
