[project]
name = "magick_mind"
version = "0.0.1"
authors = [
    { name = "Adrian", email = "minoak@globalmagicko.com" },
    { name = "Turtle", email = "turtle@globalmagicko.com" },
    { name = "Min Thu Wai", email = "minthu@globalmagicko.com" },
]
description = "SDK version to use Magick Mind AI service developed by Magick Mind Team."
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "centrifuge-python>=0.4.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
